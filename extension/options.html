<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CodeCartographer settings</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 420px;
    margin: 2rem auto;
    padding: 0 1rem;
    color: #1a1a1a;
  }
  h1 { font-size: 1.1rem; }
  label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; margin-top: 1rem; }
  input[type="text"] {
    width: 100%;
    box-sizing: border-box;
    padding: 0.5rem 0.6rem;
    font-size: 0.9rem;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  button {
    margin-top: 1.25rem;
    padding: 0.5rem 1rem;
    font-size: 0.9rem;
    border: none;
    border-radius: 6px;
    background: #1a1a1a;
    color: white;
    cursor: pointer;
  }
  #status { margin-top: 0.75rem; font-size: 0.85rem; }
  #status.error { color: #b00020; }
  #status.success { color: #1a7a1a; }
  p.hint { font-size: 0.8rem; color: #666; }
</style>
</head>
<body>
  <h1>CodeCartographer settings</h1>
  <p class="hint">
    Points the side panel at your locally running CodeCartographer backend
    (<code>uvicorn codecartographer.api:app</code>).
  </p>
  <form id="settings-form">
    <label for="backend-url">Backend URL</label>
    <input type="text" id="backend-url" placeholder="http://localhost:8000" required />

    <label for="repo-path">Default repo path (optional)</label>
    <input type="text" id="repo-path" placeholder="/path/to/indexed/repo" />

    <button type="submit" id="save-btn">Save</button>
  </form>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
